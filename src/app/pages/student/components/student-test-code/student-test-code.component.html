<mat-form-field class="answer-form" appearance="outline">
  <input
    matInput
    placeholder="Код"
    type="number"
    [formControl]="testId"
    required
  />
</mat-form-field>

<div class="button-container">
  <button
    (click)="getTest()"
    class="next-btn"
    mat-raised-button
    color="primary"
    matStepperNext
    [disabled]="testId.invalid"
  >
    Продолжить
  </button>
</div>
